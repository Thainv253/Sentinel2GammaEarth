# =============================================
# Sentinel-2 Super Resolution — Docker Compose
# =============================================
# Hỗ trợ 2 profiles: gpu (mặc định) và cpu
#
# Chạy GPU:
#   docker compose --profile gpu up --build
#   docker compose --profile gpu run --rm sentinel2-gpu python run_pipeline.py
#
# Chạy CPU:
#   docker compose --profile cpu up --build
#   docker compose --profile cpu run --rm sentinel2-cpu python run_pipeline.py
#
# Hoặc đơn giản, dùng script:
#   ./docker-run.sh gpu
#   ./docker-run.sh cpu
# =============================================

x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ./data:/app/data
    - ./output:/app/output
    - ./credentials:/app/credentials:ro
    - ./.env:/app/.env:ro
  env_file:
    - .env
  stdin_open: true
  tty: true
  working_dir: /app

services:
  # ── GPU MODE (NVIDIA CUDA) ──
  sentinel2-gpu:
    <<: *common
    container_name: sentinel2-gpu
    profiles: [ "gpu" ]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: nvidia/cuda:12.4.1-runtime-ubuntu22.04
    environment:
      - DEVICE=gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  # ── CPU MODE (Ubuntu thuần) ──
  sentinel2-cpu:
    <<: *common
    container_name: sentinel2-cpu
    profiles: [ "cpu" ]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ubuntu:22.04
    environment:
      - DEVICE=cpu
